name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # test: run on every push and PR, across all supported platforms + versions
  # ---------------------------------------------------------------------------
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install csttool with test dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest tests/ -x -q

  # ---------------------------------------------------------------------------
  # publish: triggered on a v* tag only, after tests pass
  #
  # Prerequisites (one-time setup on PyPI):
  #   1. Create the csttool project on https://pypi.org
  #   2. Under the project > Settings > Publishing, add a Trusted Publisher:
  #        Owner:    alemnalo
  #        Repo:     csttool
  #        Workflow: ci.yml
  #        Environment: (leave blank)
  #   This replaces API token auth with keyless OIDC — no secrets to manage.
  # ---------------------------------------------------------------------------
  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write  # required for PyPI trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install hatch
        run: pip install hatch

      - name: Build distributions
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
